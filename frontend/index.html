<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataSpeak</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-ui: "LXGW WenKai", "STKaiti", "KaiTi", "PingFang SC", "Microsoft YaHei", serif;
      --font-mono: "Cascadia Mono", "JetBrains Mono", monospace;

      --bg-dark: #1a1b24;
      --surface-dark: #252733;
      --panel-dark: #2d3040;
      --panel-2-dark: #35394d;
      --border-dark: #4a4f69;
      --text-dark: #f2f1ea;
      --muted-dark: #c8c5b7;
      --accent-dark: #6f9dff;
      --accent-2-dark: #7e73d8;
      --danger-dark: #f36f70;
      --success-dark: #5ebf7d;

      --bg-light: #f4eedf;
      --surface-light: #fffaf0;
      --panel-light: #f8f1e2;
      --panel-2-light: #efe4cf;
      --border-light: #d8cbb2;
      --text-light: #433a2d;
      --muted-light: #7f715d;
      --accent-light: #4f78d2;
      --accent-2-light: #7b5fc2;
      --danger-light: #ce5a5a;
      --success-light: #4b9a6c;

      --bg: var(--bg-dark);
      --surface: var(--surface-dark);
      --panel: var(--panel-dark);
      --panel-2: var(--panel-2-dark);
      --border: var(--border-dark);
      --text: var(--text-dark);
      --muted: var(--muted-dark);
      --accent: var(--accent-dark);
      --accent-2: var(--accent-2-dark);
      --danger: var(--danger-dark);
      --success: var(--success-dark);
    }

    body.theme-light {
      --bg: var(--bg-light);
      --surface: var(--surface-light);
      --panel: var(--panel-light);
      --panel-2: var(--panel-2-light);
      --border: var(--border-light);
      --text: var(--text-light);
      --muted: var(--muted-light);
      --accent: var(--accent-light);
      --accent-2: var(--accent-2-light);
      --danger: var(--danger-light);
      --success: var(--success-light);
    }

    body {
      font-family: var(--font-ui);
      background:
        radial-gradient(140% 100% at 0% 0%, color-mix(in oklab, var(--accent) 12%, var(--bg)) 0%, transparent 44%),
        linear-gradient(180deg, color-mix(in oklab, var(--panel) 35%, transparent), transparent 140px),
        repeating-linear-gradient(180deg, transparent 0, transparent 29px, color-mix(in oklab, var(--border) 22%, transparent) 30px);
      background-color: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: 56px 1fr;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 16px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in oklab, var(--surface) 94%, transparent);
      backdrop-filter: blur(3px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: .4px;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 20px color-mix(in oklab, var(--accent) 55%, transparent);
    }

    .header-actions { display: flex; gap: 8px; }

    .header-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      padding: 7px 11px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .header-btn:hover { border-color: var(--accent); color: var(--accent); }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: 232px minmax(300px, 32%) minmax(520px, 1fr);
    }

    .left-pane,
    .right-pane {
      background: color-mix(in oklab, var(--surface) 97%, transparent);
      border-right: 1px solid var(--border);
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .right-pane {
      border-right: 0;
      border-left: 1px solid var(--border);
      background: color-mix(in oklab, var(--surface) 99%, transparent);
    }

    .right-pane .pane-head {
      font-weight: 600;
      letter-spacing: 0.4px;
    }

    .pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }

    .new-session-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .new-session-btn:hover { border-color: var(--accent); color: var(--accent); }

    .session-list {
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }

    .session-item {
      border: 1px solid transparent;
      background: transparent;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      transition: .15s ease;
    }

    .session-item:hover { background: var(--panel); border-color: var(--border); }
    .session-item.active {
      background: color-mix(in oklab, var(--accent) 18%, var(--panel));
      border-color: color-mix(in oklab, var(--accent) 55%, var(--border));
    }

    .session-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .session-preview {
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .load-more-btn {
      margin: 6px 8px 10px;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .center-pane {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr auto auto;
      background: color-mix(in oklab, var(--surface) 93%, transparent);
    }

    .center-pane .pane-head {
      border-bottom: 1px dashed color-mix(in oklab, var(--border) 75%, transparent);
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .center-title small {
      margin-left: 8px;
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
    }

    .note-tip {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .tip-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      margin-right: 6px;
      background: color-mix(in oklab, var(--accent) 70%, var(--panel));
      vertical-align: middle;
    }

    .table-subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-left: 8px;
      font-weight: 400;
    }

    .table-note {
      font-size: 11px;
      color: var(--muted);
    }

    @media (max-width: 1360px) {
      .center-pane .pane-head,
      .right-pane .pane-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
    }

    @media (max-width: 1160px) {
      .center-pane .pane-head,
      .right-pane .pane-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
    }

    @media (max-width: 1080px) {
      .note-tip,
      .table-note {
        display: none;
      }
    }

    @media (max-width: 900px) {
      .center-title small,
      .table-subtitle {
        display: none;
      }
    }

    @media (max-width: 760px) {
      .center-pane .pane-head,
      .right-pane .pane-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
    }

    .chat-toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .quick-note {
      border: 1px solid color-mix(in oklab, var(--border) 82%, transparent);
      border-radius: 999px;
      padding: 3px 10px;
      background: color-mix(in oklab, var(--panel) 92%, transparent);
    }

    .chat-messages {
      overflow-y: auto;
      padding: 18px clamp(14px, 2vw, 24px);
      display: flex;
      flex-direction: column;
      gap: 13px;
      min-height: 0;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-width: 100%;
    }

    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }

    .bubble {
      max-width: min(82%, 430px);
      padding: 10px 13px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.64;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid transparent;
    }

    .message.user .bubble {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #fff;
      border-bottom-right-radius: 7px;
      box-shadow: 0 8px 18px color-mix(in oklab, var(--accent) 28%, transparent);
    }

    .message.assistant .bubble {
      background: color-mix(in oklab, var(--panel) 94%, transparent);
      border-color: color-mix(in oklab, var(--border) 90%, transparent);
      border-bottom-left-radius: 7px;
    }

    .bubble.error {
      border-color: color-mix(in oklab, var(--danger) 50%, var(--border));
      background: color-mix(in oklab, var(--danger) 15%, var(--panel));
    }

    .bubble.success {
      border-color: color-mix(in oklab, var(--success) 50%, var(--border));
      background: color-mix(in oklab, var(--success) 12%, var(--panel));
    }

    .meta {
      font-size: 11px;
      color: var(--muted);
    }

    .intent-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
      margin-left: 6px;
    }

    .steps {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-width: 92%;
    }

    .step-pill {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      color: var(--muted);
    }

    .step-pill.active { border-color: var(--accent); color: var(--accent); }
    .step-pill.done { color: var(--success); border-color: color-mix(in oklab, var(--success) 42%, var(--border)); }

    .confirm-card {
      border: 1px solid color-mix(in oklab, var(--accent) 40%, var(--border));
      background: color-mix(in oklab, var(--accent) 12%, var(--panel));
      border-radius: 12px;
      padding: 12px;
      max-width: min(92%, 760px);
    }

    .confirm-actions { margin-top: 10px; display: flex; gap: 8px; }

    .btn {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      transition: .15s ease;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { filter: brightness(1.06); }
    .btn.danger { color: var(--danger); border-color: color-mix(in oklab, var(--danger) 45%, var(--border)); }

    .chat-status {
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      font-size: 12px;
      color: var(--muted);
      min-height: 34px;
    }

    .chat-input {
      border-top: 1px solid var(--border);
      padding: 12px 14px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: color-mix(in oklab, var(--surface) 95%, transparent);
    }

    #user-input {
      flex: 1;
      min-height: 42px;
      max-height: 140px;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      padding: 10px 12px;
      outline: none;
    }

    #user-input:focus { border-color: var(--accent); }

    #send-btn {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #fff;
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
    }

    #send-btn:disabled { opacity: .55; cursor: not-allowed; }

    .table-toolbar {
      border-bottom: 1px dashed color-mix(in oklab, var(--border) 88%, transparent);
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 2;
      background: color-mix(in oklab, var(--surface) 98%, transparent);
    }

    .toolbar-divider {
      width: 1px;
      background: color-mix(in oklab, var(--border) 82%, transparent);
      margin: 2px 0;
    }

    .table-toolbar .btn,
    .table-toolbar #table-select {
      min-height: 34px;
    }

    .table-tools-note {
      width: 100%;
      font-size: 11px;
      color: var(--muted);
      margin-top: -2px;
    }

    @media (max-width: 1080px) {
      .table-tools-note,
      .toolbar-divider {
        display: none;
      }
    }

    @media (max-width: 900px) {
      .table-toolbar {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .table-toolbar {
        padding: 10px;
      }
    }

    @media (max-width: 640px) {
      .table-toolbar {
        gap: 6px;
      }

      .table-toolbar .btn {
        font-size: 11px;
        padding: 6px 8px;
      }
    }

    @media (max-width: 520px) {
      #table-select {
        min-width: 100%;
      }
    }

    @media (max-width: 400px) {
      .table-toolbar {
        padding: 8px;
      }
    }

    @media (max-width: 320px) {
      .table-toolbar .btn {
        width: 100%;
      }
    }

    @media (max-height: 740px) {
      .table-toolbar {
        position: static;
      }
    }

    @media (max-height: 660px) {
      .table-tools-note {
        display: none;
      }
    }

    @media (max-height: 580px) {
      .table-toolbar {
        padding: 8px;
      }
    }

    @media (max-height: 500px) {
      .table-toolbar {
        gap: 6px;
      }
    }

    .right-pane .table-content {
      flex: 1;
      min-height: 0;
    }

    .right-pane .empty {
      margin-top: 8px;
    }

    .right-pane .table-meta {
      font-size: 12px;
      margin-bottom: 10px;
    }

    .right-pane .data-table {
      font-size: 12px;
    }

    .right-pane .data-table td {
      line-height: 1.5;
    }

    .right-pane .data-table th {
      letter-spacing: 0.2px;
    }

    .right-pane .data-table th,
    .right-pane .data-table td {
      max-width: 260px;
    }

    .right-pane .data-table tbody tr:hover td {
      background: color-mix(in oklab, var(--panel) 78%, transparent);
    }

    .right-pane .table-content::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .right-pane .table-content::-webkit-scrollbar-thumb {
      background: color-mix(in oklab, var(--border) 80%, transparent);
      border-radius: 999px;
    }

    .right-pane .table-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .modal-title {
      font-size: 16px;
      margin-bottom: 12px;
      letter-spacing: 0.4px;
    }

    .modal-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .modal-close {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }

    .modal-close:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .settings-modal .create-card {
      width: min(620px, 96vw);
    }

    .settings-modal .setting-group {
      background: color-mix(in oklab, var(--panel) 95%, transparent);
    }

    .settings-modal .settings-actions {
      margin-top: 4px;
    }

    .settings-modal .btn.primary {
      min-width: 96px;
    }

    .settings-modal .field {
      margin-bottom: 12px;
    }

    .settings-modal .field:last-child {
      margin-bottom: 0;
    }

    .settings-modal .field small {
      line-height: 1.4;
    }

    .settings-modal .field input,
    .settings-modal .field select {
      background: color-mix(in oklab, var(--surface) 74%, var(--panel));
    }

    .settings-modal .setting-group + .setting-group {
      margin-top: 10px;
    }

    .settings-modal .settings-wrap {
      max-height: 72vh;
      padding: 2px;
    }

    @media (max-width: 740px) {
      .settings-modal .create-card {
        width: 95vw;
      }
    }

    @media (max-height: 760px) {
      .settings-modal .settings-wrap {
        max-height: 68vh;
      }
    }

    @media (max-height: 620px) {
      .settings-modal .settings-wrap {
        max-height: 62vh;
      }
    }

    @media (max-width: 560px) {
      .modal-head {
        align-items: center;
      }

      .modal-subtitle {
        margin-bottom: 8px;
      }
    }

    @media (max-width: 420px) {
      .settings-modal .settings-actions .btn {
        width: 100%;
      }
    }

    @media (max-width: 360px) {
      .settings-modal .create-card {
        padding: 12px;
      }
    }

    @media (max-width: 300px) {
      .settings-modal .field label {
        font-size: 11px;
      }
    }

    @media (max-height: 520px) {
      .settings-modal .create-card {
        max-height: 92vh;
      }
    }

    @media (max-height: 460px) {
      .settings-modal .modal-subtitle {
        display: none;
      }
    }

    @media (max-height: 400px) {
      .settings-modal .create-card {
        padding: 10px;
      }
    }

    @media (max-width: 1240px) {
      .main { grid-template-columns: 220px minmax(280px, 40vw) minmax(460px, 1fr); }
    }

    @media (max-width: 1120px) {
      .main { grid-template-columns: 200px minmax(260px, 40vw) minmax(420px, 1fr); }
      .bubble { max-width: min(86%, 390px); }
    }

    @media (max-width: 980px) {
      .main { grid-template-columns: 1fr; }
      .left-pane, .right-pane { display: none; }
      .bubble { max-width: 90%; }
    }

    @media (max-width: 560px) {
      .chat-input {
        padding: 10px;
      }

      #send-btn {
        padding: 10px 12px;
      }
    }
    #table-select {
      flex: 1;
      min-width: 120px;
      border: 1px solid var(--border);
      background: color-mix(in oklab, var(--surface) 84%, var(--panel));
      color: var(--text);
      border-radius: 10px;
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
    }

    #table-select:focus {
      border-color: var(--accent);
    }

    .table-content {
      flex: 1;
      overflow: auto;
      padding: 10px;
    }

    .table-meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th,
    .data-table td {
      border-bottom: 1px solid var(--border);
      padding: 7px 8px;
      text-align: left;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      max-width: 220px;
    }

    .data-table th {
      position: sticky;
      top: 0;
      background: var(--panel-2);
      z-index: 1;
      color: var(--muted);
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 24px 14px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .settings-wrap {
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .setting-group {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: var(--panel);
    }

    .setting-group h3 { font-size: 13px; margin-bottom: 10px; }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .field label { font-size: 12px; color: var(--muted); }
    .field input,
    .field select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 12px;
      outline: none;
    }

    .field input:focus,
    .field select:focus { border-color: var(--accent); }

    .field small { color: var(--muted); font-size: 11px; }

    .settings-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .create-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .48);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    .create-modal.open { display: flex; }

    .create-card {
      width: min(560px, 96vw);
      max-height: 86vh;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      padding: 16px;
    }

    .col-list { display: grid; gap: 6px; }

    .col-row {
      display: grid;
      grid-template-columns: 1fr 110px auto auto;
      gap: 6px;
      align-items: center;
    }

    .col-row input,
    .col-row select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px;
      background: var(--panel);
      color: var(--text);
      font-size: 12px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

  </style>
</head>
<body>
  <div id="app" class="app">
    <header class="header">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>DataSpeak</span>
      </div>
      <div class="header-actions">
        <button class="header-btn" type="button" @click="toggleTheme">主题切换</button>
        <button class="header-btn" type="button" @click="openSettingsModal">模型设置</button>
      </div>
    </header>

    <div class="main">
      <aside class="left-pane">
        <div class="pane-head">
          <span>会话历史</span>
          <button class="new-session-btn" type="button" @click="createNewSession">新建会话</button>
        </div>

        <div class="session-list">
          <button
            v-for="session in displayedSessions"
            :key="session.id"
            type="button"
            class="session-item"
            :class="{ active: session.id === sessionId }"
            @click="switchSession(session.id)"
          >
            <div class="session-title">{{ session.title }}</div>
            <div class="session-preview">{{ session.preview || '空会话' }}</div>
          </button>
        </div>

        <button
          v-if="remainingSessionCount > 0"
          class="load-more-btn"
          type="button"
          @click="loadMoreSessions"
        >
          加载更多 ({{ remainingSessionCount }})
        </button>
      </aside>

      <section class="center-pane">
        <div class="pane-head">
          <div class="center-title">对话笔记 <small>短句输入更容易读写</small></div>
          <div class="note-tip"><span class="tip-dot"></span>像写笔记一样描述你的数据操作</div>
        </div>

        <div id="chat-messages" class="chat-messages">
          <div class="chat-toolbar"><span class="quick-note">记录区</span></div>
          <template v-for="item in chatItems" :key="item.id">
            <div v-if="item.type === 'message'" class="message" :class="item.role">
              <div class="bubble" :class="item.className">{{ item.text }}</div>
              <div v-if="item.role === 'assistant' && item.intent" class="meta">
                意图 <span class="intent-badge">{{ item.intent }}</span>
              </div>
            </div>

            <div v-else-if="item.type === 'steps'" class="message assistant">
              <div class="steps">
                <span
                  v-for="(step, idx) in item.steps"
                  :key="`${item.id}_${idx}`"
                  class="step-pill"
                  :class="step.status"
                >
                  {{ step.label }}
                </span>
              </div>
            </div>

            <div v-else-if="item.type === 'confirm'" class="message assistant">
              <div class="confirm-card">
                <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">请确认以下操作</div>
                <div style="font-size:13px;white-space:pre-wrap;">{{ item.previewText }}</div>
                <div class="confirm-actions">
                  <button class="btn primary" type="button" :disabled="item.busy" @click="handleConfirmRun(item.id)">确认执行</button>
                  <button class="btn" type="button" :disabled="item.busy" @click="handleConfirmCancel(item.id)">取消</button>
                </div>
                <div v-if="item.inlineError" class="confirm-inline-error" style="margin-top:8px;font-size:12px;color:var(--danger);">
                  {{ item.inlineError }}
                </div>
              </div>
            </div>
          </template>
        </div>

        <div class="chat-status">{{ statusText }}</div>

        <div class="chat-input">
          <textarea
            id="user-input"
            ref="inputRef"
            v-model="userInput"
            placeholder="输入自然语言指令，例如：添加一条待办，明天下午提交报告"
            @input="adjustInputHeight"
            @keydown="onInputKeydown"
          ></textarea>
          <button id="send-btn" type="button" :disabled="isLoading" @click="sendMessage">发送</button>
        </div>
      </section>

      <aside class="right-pane">
        <div class="pane-head">
          <div>数据表 <span class="table-subtitle">主要工作区</span></div>
          <div class="table-note">右侧保留更多空间，便于查看多列与记录。</div>
        </div>

        <div class="table-toolbar">
          <select id="table-select" v-model="currentTable" @change="loadTableData($event.target.value)">
            <option v-if="!allTables.length" value="">-- 暂无表 --</option>
            <option v-for="table in allTables" :key="table.name" :value="table.name">
              {{ table.description ? `${table.name} — ${table.description}` : table.name }}
            </option>
          </select>
          <button class="btn" type="button" @click="refreshTable">刷新</button>
          <span class="toolbar-divider"></span>
          <button class="btn danger" type="button" @click="deleteCurrentTable">删除表</button>
          <button class="btn primary" type="button" @click="openCreateModal">新建表</button>
          <div class="table-tools-note">可在左侧对话中增删改，再在此处查看实时结果。</div>
        </div>

        <div class="table-content">
          <div v-if="tableLoadingText" class="empty">{{ tableLoadingText }}</div>
          <template v-else>
            <div class="table-meta">{{ tableData.table }} · {{ tableData.rows.length }} 条记录 · {{ tableData.columns.length }} 列</div>
            <table class="data-table">
              <thead>
                <tr>
                  <th v-for="col in tableData.columns" :key="`head_${col.name}`" :title="col.type">{{ col.name }}</th>
                </tr>
              </thead>
              <tbody>
                <tr v-if="!tableData.rows.length">
                  <td :colspan="tableData.columns.length || 1">暂无数据，试试通过聊天新增一条记录。</td>
                </tr>
                <tr v-for="(row, rowIndex) in tableData.rows" :key="`row_${rowIndex}`">
                  <td v-for="col in tableData.columns" :key="`cell_${rowIndex}_${col.name}`" :title="row[col.name] ?? '—'">
                    {{ row[col.name] ?? '—' }}
                  </td>
                </tr>
              </tbody>
            </table>
          </template>
        </div>
      </aside>
    </div>

    <div class="create-modal settings-modal" :class="{ open: settingsModalOpen }" @click.self="closeSettingsModal">
      <div class="create-card">
        <div class="modal-head">
          <div>
            <h2 class="modal-title">模型设置</h2>
            <p class="modal-subtitle">保存后会立即用于新请求，不会影响右侧数据表展示。</p>
          </div>
          <button class="modal-close" type="button" @click="closeSettingsModal">✕</button>
        </div>

        <div class="settings-wrap">
          <div class="setting-group">
            <h3>模型连接</h3>
            <div class="field">
              <label for="api-base-url">API 端点</label>
              <input id="api-base-url" v-model="settings.api_base_url" type="text" placeholder="https://api.openai.com/v1" />
              <small>支持 OpenAI 兼容端点</small>
            </div>
            <div class="field">
              <label for="api-key">API 密钥</label>
              <input id="api-key" v-model="settings.api_key" type="password" placeholder="sk-..." />
              <small>密钥会保存到后端配置，并在本地缓存</small>
            </div>
            <div class="field">
              <label for="model-id">模型 ID</label>
              <input id="model-id" v-model="settings.model_id" type="text" placeholder="gpt-4o-mini" />
            </div>
            <div class="field">
              <label for="temperature">温度 (0.0 - 2.0)</label>
              <input id="temperature" v-model.number="settings.temperature" type="number" min="0" max="2" step="0.1" />
            </div>
            <div class="field">
              <label for="max-history">服务端历史长度 (1-200)</label>
              <input id="max-history" v-model.number="settings.max_history_length" type="number" min="1" max="200" step="1" />
            </div>
          </div>

          <div class="setting-group">
            <h3>界面偏好</h3>
            <div class="field">
              <label for="theme-select">主题</label>
              <select id="theme-select" v-model="settings.theme" @change="applyTheme(settings.theme)">
                <option value="dark">深色</option>
                <option value="light">浅色</option>
              </select>
            </div>
            <div class="field">
              <label for="session-limit">会话列表展示数量</label>
              <input id="session-limit" v-model.number="settings.session_limit" type="number" min="5" max="100" step="1" />
            </div>
          </div>

          <div class="settings-actions">
            <button class="btn primary" type="button" @click="saveSettings">保存设置</button>
            <button class="btn" type="button" @click="testSettings">测试连接</button>
            <button class="btn" type="button" @click="resetSettings">恢复默认</button>
          </div>
        </div>
      </div>
    </div>

    <div class="create-modal" :class="{ open: createModalOpen }" @click.self="closeCreateModal">
      <div class="create-card">
        <h2 class="modal-title">新建数据表</h2>
        <p class="modal-subtitle">像写课堂笔记一样，先定义标题（表名）和字段结构。</p>
        <div class="field">
          <label for="new-table-name">表名（字母/数字/下划线）</label>
          <input id="new-table-name" v-model="createForm.table_name" type="text" placeholder="meeting_notes" />
        </div>
        <div class="field">
          <label for="new-table-desc">描述（可选）</label>
          <input id="new-table-desc" v-model="createForm.description" type="text" placeholder="会议记录和纪要" />
        </div>
        <div class="field">
          <label for="new-table-aliases">别名（可选，逗号分隔）</label>
          <input id="new-table-aliases" v-model="createForm.aliases" type="text" placeholder="会议,纪要" />
        </div>
        <div class="field">
          <label>字段定义（id/created_at 会自动添加）</label>
          <div class="col-list">
            <div v-for="column in createForm.columns" :key="column.id" class="col-row">
              <input v-model="column.name" type="text" placeholder="字段名" />
              <select v-model="column.type">
                <option value="TEXT">TEXT</option>
                <option value="INTEGER">INTEGER</option>
                <option value="REAL">REAL</option>
                <option value="BLOB">BLOB</option>
                <option value="NUMERIC">NUMERIC</option>
              </select>
              <label style="font-size:12px;color:var(--muted)"><input v-model="column.notnull" type="checkbox" /> 必填</label>
              <button type="button" class="btn" style="padding:4px 7px;" @click="removeColumnRow(column.id)">移除</button>
            </div>
          </div>
          <button class="btn" type="button" @click="addColumnRow">添加字段</button>
        </div>
        <div class="modal-actions">
          <button class="btn" type="button" @click="closeCreateModal">取消</button>
          <button class="btn primary" type="button" @click="submitCreateTable">创建</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
